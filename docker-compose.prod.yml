name: vsh-prod

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - vsh-net

  db:
    image: pgvector/pgvector:pg13
    environment:
      POSTGRES_DB: ${DB_NAME:-vsh_prod}
      POSTGRES_USER: ${DB_USER:-vsh_user}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - prod-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-vsh_user} -d ${DB_NAME:-vsh_prod} -q",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vsh-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        DEV: "false"
    env_file:
      - .env
    environment:
      DJANGO_ENV: prod
      DB_HOST: db
      DB_NAME: ${DB_NAME:-vsh_prod}
      DB_USER: ${DB_USER:-vsh_user}
      DB_PASS: ${DB_PASS:-changeme}
      DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      CORS_ALLOW_ALL_ORIGINS: "False"
      KHO_BACKEND_BASE_URL: ${KHO_BACKEND_BASE_URL:-http://localhost:8000}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}
      COLLECTSTATIC: ${COLLECTSTATIC:-1}
      DOCUMENTS_USE_CELERY: ${DOCUMENTS_USE_CELERY:-True}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./vol/web/media:/vol/web/media
      - ./vol/web/static:/vol/web/static
      - ./vol/web/logs:/vol/web/logs
    command: run.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - vsh-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        DEV: "false"
    env_file:
      - .env
    environment:
      DJANGO_ENV: prod
      DB_HOST: db
      DB_NAME: ${DB_NAME:-vsh_prod}
      DB_USER: ${DB_USER:-vsh_user}
      DB_PASS: ${DB_PASS:-changeme}
      DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      CORS_ALLOW_ALL_ORIGINS: "False"
      KHO_BACKEND_BASE_URL: ${KHO_BACKEND_BASE_URL:-http://localhost:8000}
      DOCUMENTS_USE_CELERY: ${DOCUMENTS_USE_CELERY:-True}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    volumes:
      - ./vol/web/media:/vol/web/media
      - ./vol/web/static:/vol/web/static
      - ./vol/web/logs:/vol/web/logs
    command: >
      sh -c "
        python manage.py wait_for_db &&
        celery -A app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
      "
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - vsh-net

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        DEV: "false"
    env_file:
      - .env
    environment:
      DJANGO_ENV: prod
      DB_HOST: db
      DB_NAME: ${DB_NAME:-vsh_prod}
      DB_USER: ${DB_USER:-vsh_user}
      DB_PASS: ${DB_PASS:-changeme}
      DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      CORS_ALLOW_ALL_ORIGINS: "False"
      KHO_BACKEND_BASE_URL: ${KHO_BACKEND_BASE_URL:-http://localhost:8000}
      DOCUMENTS_USE_CELERY: ${DOCUMENTS_USE_CELERY:-True}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    volumes:
      - ./vol/web/media:/vol/web/media
      - ./vol/web/static:/vol/web/static
      - ./vol/web/logs:/vol/web/logs
    command: >
      sh -c "
        python manage.py wait_for_db &&
        celery -A app beat --loglevel=info
      "
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - vsh-net

networks:
  vsh-net:
    driver: bridge

volumes:
  prod-db-data:
